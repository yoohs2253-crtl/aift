<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skul Encyclopedia - 정밀 분석 도감</title>
    <style>
        :root {
            --bg-color: #0d0b1e;
            --card-bg: #16142e;
            --accent-color: #9b59b6;
            --text-color: #e0e0e0;
            --common: #95a5a6;
            --rare: #2ecc71;
            --unique: #3498db;
            --legendary: #f1c40f;
            --item-bg: #252245;
            --physical: #e74c3c;
            --magic: #5dade2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            padding: 80px 0 40px;
            background: linear-gradient(to bottom, #1a1635, var(--bg-color));
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #fff, var(--accent-color), #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .header-desc {
            font-size: 1.1rem;
            color: #888;
            margin-top: 10px;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 11, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        nav a {
            padding: 8px 15px;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        nav a.nav-common { border-color: var(--common); color: var(--common); }
        nav a.nav-rare { border-color: var(--rare); color: var(--rare); }
        nav a.nav-unique { border-color: var(--unique); color: var(--unique); }
        nav a.nav-legendary { border-color: var(--legendary); color: var(--legendary); }

        nav a:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 2rem;
            margin: 60px 0 25px;
            padding-left: 15px;
            border-left: 6px solid;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .rarity-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .skul-name {
            font-size: 1.4rem;
            margin: 0 0 5px;
            color: #fff;
            font-weight: 700;
        }

        .skul-type-tag {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 12px;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }

        .type-balance { color: #5dade2; }
        .type-speed { color: #f4d03f; }
        .type-power { color: #e74c3c; }

        .dmg-type {
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
            padding: 1px 5px;
            border-radius: 3px;
        }
        .dmg-phys { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .dmg-magi { background: rgba(93, 173, 226, 0.2); color: #5dade2; border: 1px solid #5dade2; }

        .skul-desc {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 15px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 25px;
            max-width: 650px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 35px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            color: #555;
            cursor: pointer;
        }

        .modal-header h2 { font-size: 2.5rem; margin: 0; color: #fff; }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .info-box {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 12px;
        }

        .info-box h4 {
            color: var(--accent-color);
            margin: 0 0 10px;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .detail-tag {
            background: var(--item-bg);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ins-tag {
            background: rgba(155, 89, 182, 0.1);
            border-color: rgba(155, 89, 182, 0.4);
            color: #d291e6;
        }

        .play-tip {
            margin-top: 25px;
            background: rgba(155, 89, 182, 0.05);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
        }

        footer {
            text-align: center;
            padding: 80px 0 40px;
            color: #444;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>SKUL MASTER GUIDE</h1>
            <p class="header-desc">각 스컬의 데미지 타입별 최적화 빌드 분석</p>
        </div>
    </header>

    <nav>
        <a href="#common" class="nav-common">COMMON</a>
        <a href="#rare" class="nav-rare">RARE</a>
        <a href="#unique" class="nav-unique">UNIQUE</a>
        <a href="#legendary" class="nav-legendary">LEGENDARY</a>
    </nav>

    <div class="container">
        <section id="common-section">
            <h2 class="section-title" style="border-color: var(--common); color: var(--common)">Common (일반)</h2>
            <div class="grid" id="common-grid"></div>
        </section>

        <section id="rare-section">
            <h2 class="section-title" style="border-color: var(--rare); color: var(--rare)">Rare (레어)</h2>
            <div class="grid" id="rare-grid"></div>
        </section>

        <section id="unique-section">
            <h2 class="section-title" style="border-color: var(--unique); color: var(--unique)">Unique (유니크)</h2>
            <div class="grid" id="unique-grid"></div>
        </section>

        <section id="legendary-section">
            <h2 class="section-title" style="border-color: var(--legendary); color: var(--legendary)">Legendary (전설)</h2>
            <div class="grid" id="legendary-grid"></div>
        </section>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Skul Strategy Lab. 정밀 검토 완료.</p>
    </footer>

    <script>
        const skulData = [
            // COMMON
            { name: "리틀본", rarity: "common", type: "balance", dmg: "magic", desc: "머리를 던져 마법 피해를 입힙니다. 기본 스컬이지만 마나 순환 빌드와 결합 시 무한 스킬 난사가 가능합니다.", items: ["마법사의 목걸이", "마나의 뼈", "마나테크 부품"], ins: ["지혜", "마나 순환"], tip: "마나테크 부품을 챙겨 머리 회수 시의 쿨타임 감소를 극대화하세요. 지혜 4단계 세팅이 필수입니다." },
            { name: "스켈레톤-칼", rarity: "common", type: "power", dmg: "phys", desc: "기본적인 물리 보병. 단순한 베기 공격 위주이며 '걸작' 각인과 시너지가 좋습니다.", items: ["용기병의 긍지", "피묻은 칼날", "강철 장화"], ins: ["용기", "걸작"], tip: "평타 막타의 판정이 좋으므로 평타 콤보를 끝까지 넣는 것이 중요합니다. 공격 속도 보완이 필요합니다." },
            { name: "웨어울프", rarity: "common", type: "speed", dmg: "phys", desc: "치명타와 이동 속도에 특화된 물리 딜러. '강타' 각인 효율이 모든 스컬 중 가장 높습니다.", items: ["보이지 않는 화살", "화약 검", "고통과 절망"], ins: ["용기", "강타"], tip: "사냥 스킬 사용 후 증폭된 데미지로 적을 압도하세요. 화약 검은 웨어울프의 핵심 코어 아이템입니다." },
            { name: "좀도둑", rarity: "common", type: "speed", dmg: "phys", desc: "금화를 갈취하는 운영형 스컬. '보물' 각인으로 아이템을 빠르게 맞추는 것이 목표입니다.", items: ["탐욕의 동전", "황금 채찍", "결전의 맹세"], ins: ["보물", "승부"], tip: "초반 골드 수급 후 중반에 '승부'나 '용기' 아이템으로 교체하여 딜을 보충해야 합니다." },
            
            // RARE
            { name: "연금술사", rarity: "rare", type: "balance", dmg: "magic", desc: "상태 이상 마법 딜러. 화상, 빙결 등 속성 데미지를 증폭시키는 빌드가 유효합니다.", items: ["상태이상 증폭기", "발화의 장갑", "어둠의 지팡이"], ins: ["지혜", "연금술"], tip: "골렘 소환 스킬의 딜 비중이 큽니다. 지혜 각인을 우선시하여 마법 공격력을 뻥튀기하세요." },
            { name: "마법사", rarity: "rare", type: "balance", dmg: "magic", desc: "마나 차징을 통한 폭발적인 마법 범위 딜러. '마나 순환' 각인이 필수적입니다.", items: ["마법사의 목걸이", "마나의 뼈", "고대 마법서"], ins: ["지혜", "마나 순환"], tip: "마나 충전 시간 동안 취약하므로 거리를 두거나 무적기가 있는 정수를 함께 사용하세요." },
            { name: "미라", rarity: "rare", type: "balance", dmg: "phys", desc: "총기를 사용하는 원거리 물리 딜러. '걸작'과 '붕괴' 각인을 섞어 안정적인 딜을 넣습니다.", items: ["강철 탄환", "화약 화살", "기계식 석궁"], ins: ["용기", "붕괴"], tip: "총기 연사 시의 반동을 컨트롤하여 적과의 거리를 유지하는 것이 핵심입니다." },
            { name: "지니", rarity: "rare", type: "speed", dmg: "magic", desc: "무적기를 다수 보유한 마법 딜러. '지혜'와 '환영' 각인으로 생존과 딜을 동시에 챙깁니다.", items: ["영혼 약탈자", "마나의 뼈", "기폭 장치"], ins: ["지혜", "환영"], tip: "스킬 사용 중에는 무적입니다. 패턴이 복잡한 보스를 상대로 매우 안정적인 성능을 보여줍니다." },

            // UNIQUE
            { name: "사무라이", rarity: "unique", type: "speed", dmg: "phys", desc: "표식을 쌓아 터뜨리는 물리 누커. '강타' 각인 4단계를 통한 일섬 데미지 극대화가 정석입니다.", items: ["피묻은 칼날", "고통과 절망", "희망 절단기"], ins: ["용기", "강타"], tip: "풀 스택 일섬은 전설급 스컬보다 강력합니다. 무리한 평타보다 표식 관리에 집중하세요." },
            { name: "버서커", rarity: "unique", type: "power", dmg: "phys", desc: "체력이 낮을수록 강해지는 물리 탱커/딜러. '복수' 각인과의 시너지가 환상적입니다.", items: ["피묻은 칼날", "복수의 귀환", "용기병의 긍지"], ins: ["용기", "복수"], tip: "체력을 30% 정도로 유지하며 폭주 모드를 상시 가동하세요. '복수' 각인이 생존을 책임집니다." },
            { name: "다크 팔라딘", rarity: "unique", type: "balance", dmg: "magic", desc: "보호막을 생성하는 마법 딜러. 생존형 스컬이지만 마법 딜 세팅 시 매우 강력합니다.", items: ["결전의 맹세", "수호자의 성배", "심연의 구슬"], ins: ["지혜", "요새"], tip: "보호막이 유지되는 동안 공격력이 상승하므로, 최대한 맞지 않으면서 스킬을 난사하세요." },
            { name: "닌자", rarity: "unique", type: "speed", dmg: "phys", desc: "공중 콤보 특화 물리 딜러. '강습'과 '암습' 각인으로 순간적인 폭딜을 넣습니다.", items: ["암습용 단검", "그림자 망토", "허공의 비수"], ins: ["용기", "강습"], tip: "지상보다 공중 공격이 빠르고 강력합니다. 공중 체공 시간을 늘려주는 정수를 추천합니다." },

            // LEGENDARY
            { name: "그림 리퍼", rarity: "legendary", type: "power", dmg: "magic", desc: "무한 성장형 마법 딜러. '지혜'와 '유물' 각인으로 마법 공격력과 치명타를 극대화합니다.", items: ["영혼 약탈자", "죽음의 성배", "심연의 구슬"], ins: ["지혜", "유물"], tip: "영혼 150스택 이상부터 진가가 드러납니다. 초반에 지혜 각인을 빠르게 맞춰 영혼 수급을 돕으세요." },
            { name: "챔피언", rarity: "legendary", type: "speed", dmg: "phys", desc: "인파이팅 물리 딜러. '용기'와 '걸작' 각인으로 평타와 스킬 데미지를 극대화합니다.", items: ["용기병의 긍지", "피묻은 칼날", "결전의 맹세"], ins: ["용기", "걸작"], tip: "보스의 패턴을 패링(반격)하는 데 성공하면 분노 게이지가 즉시 풀로 차오릅니다." },
            { name: "아크리치", rarity: "legendary", type: "balance", dmg: "magic", desc: "광범위 암흑 마법 딜러. '지혜'와 '심연' 각인으로 화면 전체를 장악합니다.", items: ["심연의 구슬", "어둠의 지팡이", "고대 마법서"], ins: ["지혜", "심연"], tip: "사슬로 적을 묶고 광역기를 퍼붓는 콤보가 기본입니다. 쿨타임 감소 세팅이 효율이 좋습니다." },
            { name: "야차", rarity: "legendary", type: "power", dmg: "phys", desc: "최강의 물리 파워 딜러. '강타'와 '돌격' 각인으로 밟기 공격의 위력을 극대화합니다.", items: ["거인의 도끼", "대지의 분노", "용기병의 긍지"], ins: ["용기", "강타"], tip: "야차 영역 안에서의 밟기 공격은 엄청난 범위를 가집니다. 영역 유지에 신경 쓰세요." }
        ];

        function renderSkuls() {
            skulData.forEach(skul => {
                const gridId = `${skul.rarity}-grid`;
                const grid = document.getElementById(gridId);
                if (!grid) return;

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetail(skul);

                card.innerHTML = `
                    <span class="rarity-badge" style="background: var(--${skul.rarity})">${skul.rarity}</span>
                    <h3 class="skul-name">${skul.name}<span class="dmg-type ${skul.dmg === 'phys' ? 'dmg-phys' : 'dmg-magi'}">${skul.dmg === 'phys' ? '물리' : '마법'}</span></h3>
                    <span class="skul-type-tag type-${skul.type}">${skul.type.toUpperCase()}</span>
                    <p class="skul-desc">${skul.desc}</p>
                `;
                grid.appendChild(card);
            });
        }

        function openDetail(skul) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');

            body.innerHTML = `
                <div class="modal-header">
                    <h2>${skul.name}</h2>
                    <span class="dmg-type ${skul.dmg === 'phys' ? 'dmg-phys' : 'dmg-magi'}" style="font-size: 0.9rem;">${skul.dmg === 'phys' ? '물리 데미지 특화' : '마법 데미지 특화'}</span>
                </div>
                
                <p style="font-size: 1rem; color: #bbb; margin: 15px 0;">${skul.desc}</p>

                <div class="info-grid">
                    <div class="info-box">
                        <h4>최적 추천 아이템</h4>
                        <div class="tag-container">
                            ${skul.items.map(i => `<span class="detail-tag">${i}</span>`).join('')}
                        </div>
                    </div>
                    <div class="info-box">
                        <h4>핵심 필수 각인</h4>
                        <div class="tag-container">
                            ${skul.ins.map(i => `<span class="detail-tag ins-tag">${i}</span>`).join('')}
                        </div>
                    </div>
                </div>

                <div class="play-tip">
                    <strong style="color: var(--accent-color); display: block; margin-bottom: 5px;">빌드 핵심 전략</strong>
                    <p style="margin: 0; font-size: 0.9rem; color: #ccc;">${skul.tip}</p>
                </div>
            `;

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        window.onclick = (e) => { if (e.target == document.getElementById('detailModal')) closeModal(); };

        renderSkuls();
    </script>
</body>
</html>
