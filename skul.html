<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skul Encyclopedia - 정밀 분석 도감</title>
    <style>
        :root {
            --bg-color: #0d0b1e;
            --card-bg: #16142e;
            --accent-color: #9b59b6;
            --text-color: #e0e0e0;
            --common: #95a5a6;
            --rare: #2ecc71;
            --unique: #3498db;
            --legendary: #f1c40f;
            --item-bg: #252245;
            --physical: #e74c3c;
            --magic: #5dade2;
            --dev-color: #e67e22;
        }

        /* 개발자 모드 전용 스타일 */
        .dev-mode-active .card::before {
            content: "EDIT";
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--dev-color);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 10;
        }

        .dev-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2000;
        }

        .dev-btn {
            background: var(--dev-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .dev-btn:hover { transform: scale(1.05); background: #d35400; }

        .dev-toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--dev-color);
        }

        .edit-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .edit-label {
            display: block;
            font-size: 0.8rem;
            color: var(--dev-color);
            margin-bottom: 4px;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .save-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .del-btn { background: #c0392b; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        
        body.dev-mode-active {
            border: 4px solid var(--dev-color);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            padding: 80px 0 40px;
            background: linear-gradient(to bottom, #1a1635, var(--bg-color));
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #fff, var(--accent-color), #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .header-desc {
            font-size: 1.1rem;
            color: #888;
            margin-top: 10px;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 11, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        nav a {
            padding: 8px 15px;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        nav a.nav-common { border-color: var(--common); color: var(--common); }
        nav a.nav-rare { border-color: var(--rare); color: var(--rare); }
        nav a.nav-unique { border-color: var(--unique); color: var(--unique); }
        nav a.nav-legendary { border-color: var(--legendary); color: var(--legendary); }

        nav a:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 2rem;
            margin: 60px 0 25px;
            padding-left: 15px;
            border-left: 6px solid;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .rarity-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .skul-name {
            font-size: 1.4rem;
            margin: 0 0 5px;
            color: #fff;
            font-weight: 700;
        }

        .skul-type-tag {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 12px;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }

        .type-balance { color: #5dade2; }
        .type-speed { color: #f4d03f; }
        .type-power { color: #e74c3c; }

        .dmg-type {
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
            padding: 1px 5px;
            border-radius: 3px;
        }
        .dmg-phys { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .dmg-magi { background: rgba(93, 173, 226, 0.2); color: #5dade2; border: 1px solid #5dade2; }

        .skul-desc {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 15px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 25px;
            max-width: 650px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 35px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            color: #555;
            cursor: pointer;
        }

        .modal-header h2 { font-size: 2.5rem; margin: 0; color: #fff; }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .info-box {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 12px;
        }

        .info-box h4 {
            color: var(--accent-color);
            margin: 0 0 10px;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .skill-category {
            margin-top: 15px;
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .skill-category h5 {
            margin: 0 0 10px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-passive { color: #2ecc71; }
        .tag-swap { color: #e67e22; }
        .tag-active { color: #3498db; }

        .skill-item {
            margin-bottom: 10px;
            padding: 8px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
        }

        .skill-name-tag {
            color: #fff;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
            font-size: 0.9rem;
        }

        .skill-desc-tag {
            font-size: 0.8rem;
            color: #aaa;
        }

        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .detail-tag {
            background: var(--item-bg);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ins-tag {
            background: rgba(155, 89, 182, 0.1);
            border-color: rgba(155, 89, 182, 0.4);
            color: #d291e6;
        }

        .play-tip {
            margin-top: 25px;
            background: rgba(155, 89, 182, 0.05);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
        }

        footer {
            text-align: center;
            padding: 80px 0 40px;
            color: #444;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>SKUL MASTER GUIDE</h1>
            <p class="header-desc">각 스컬의 데미지 타입별 최적화 빌드 분석</p>
        </div>
    </header>

    <nav>
        <a href="#common" class="nav-common">COMMON</a>
        <a href="#rare" class="nav-rare">RARE</a>
        <a href="#unique" class="nav-unique">UNIQUE</a>
        <a href="#legendary" class="nav-legendary">LEGENDARY</a>
    </nav>

    <div class="container">
        <section id="common-section">
            <h2 class="section-title" style="border-color: var(--common); color: var(--common)">Common (일반)</h2>
            <div class="grid" id="common-grid"></div>
        </section>

        <section id="rare-section">
            <h2 class="section-title" style="border-color: var(--rare); color: var(--rare)">Rare (레어)</h2>
            <div class="grid" id="rare-grid"></div>
        </section>

        <section id="unique-section">
            <h2 class="section-title" style="border-color: var(--unique); color: var(--unique)">Unique (유니크)</h2>
            <div class="grid" id="unique-grid"></div>
        </section>

        <section id="legendary-section">
            <h2 class="section-title" style="border-color: var(--legendary); color: var(--legendary)">Legendary (전설)</h2>
            <div class="grid" id="legendary-grid"></div>
        </section>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="dev-controls">
        <div class="dev-toggle-container">
            <span style="font-size: 0.8rem; font-weight: bold; color: var(--dev-color);">DEV MODE</span>
            <input type="checkbox" id="devToggle" onchange="toggleDevMode()">
        </div>
        <button class="dev-btn" onclick="addNewSkul()">+ 새로운 스컬 추가</button>
        <button class="dev-btn" style="background: #2980b9;" onclick="exportHTML()">💾 파일로 저장 (Export)</button>
    </div>

    <footer>
        <p>&copy; 2026 Skul Strategy Lab. 정밀 검토 완료.</p>
    </footer>

                    { name: "아크리치", rarity: "legendary", type: "balance", dmg: "magic", desc: "광범위 암흑 마법 딜러. '지혜'와 '심연' 각인으로 화면 전체를 장악합니다.", items: ["심연의 구슬", "어둠의 지팡이", "고대 마법서"], ins: ["지혜", "심연"], tip: "사슬로 적을 묶고 광역기를 퍼붓는 콤보가 기본입니다. 쿨타임 감소 세팅이 효율이 좋습니다.", skills: [{ name: "죽음의 사슬", desc: "적들을 사슬로 묶어 이동을 제한하고 지속 피해를 줍니다." }, { name: "영혼 감옥", desc: "넓은 범위에 영혼의 감옥을 생성하여 적들을 가두고 강력한 마법 피해를 입힙니다." }] },
                    { name: "야차", rarity: "legendary", type: "power", dmg: "phys", desc: "최강의 물리 파워 딜러. '강타'와 '돌격' 각인으로 밟기 공격의 위력을 극대화합니다.", items: ["거인의 도끼", "대지의 분노", "용기병의 긍지"], ins: ["용기", "강타"], tip: "야차 영역 안에서의 밟기 공격은 엄청난 범위를 가집니다. 영역 유지에 신경 쓰세요.", skills: [{ name: "나찰의 발걸음", desc: "거대한 발로 지면을 밟아 충격파를 일으킵니다." }, { name: "귀신화", desc: "야차왕으로 변신하여 모든 공격의 범위와 위력이 비약적으로 상승합니다." }] },
                    { name: "겜블러", rarity: "legendary", type: "balance", dmg: "magic", desc: "운에 따라 딜링 능력이 결정되는 독특한 마법 딜러입니다. 잭팟 발생 시 폭발적인 피해를 줍니다.", items: ["마법사의 목걸이", "마나의 뼈", "죽음의 성배"], ins: ["지혜", "행운"], tip: "확률형 스킬이 많으므로 최대한 스킬을 자주 사용하여 잭팟 기회를 늘리세요.", skills: [{ name: "블랙잭", desc: "카드를 던져 적에게 피해를 입히며, 결과에 따라 추가 효과가 발생합니다." }, { name: "룰렛", desc: "룰렛을 돌려 무작위 광역 마법 공격을 시전합니다." }] }
                ];
            }
            renderSkuls();
        }

        function toggleDevMode() {
            isDevMode = document.getElementById('devToggle').checked;
            document.body.classList.toggle('dev-mode-active', isDevMode);
        }

        function renderSkuls() {
            ["common", "rare", "unique", "legendary"].forEach(r => {
                const grid = document.getElementById(`${r}-grid`);
                if(grid) grid.innerHTML = '';
            });

            currentSkuls.forEach((skul, index) => {
                const grid = document.getElementById(`${skul.rarity}-grid`);
                if (!grid) return;

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetail(skul, index);

                card.innerHTML = `
                    <span class="rarity-badge" style="background: var(--${skul.rarity})">${skul.rarity}</span>
                    <h3 class="skul-name">${skul.name}<span class="dmg-type ${skul.dmg === 'phys' ? 'dmg-phys' : 'dmg-magi'}">${skul.dmg === 'phys' ? '물리' : '마법'}</span></h3>
                    <span class="skul-type-tag type-${skul.type}">${skul.type.toUpperCase()}</span>
                    <p class="skul-desc">${skul.desc}</p>
                `;
                grid.appendChild(card);
            });
        }

        function openDetail(skul, index) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');

            if (isDevMode) {
                body.innerHTML = `
                    <h2 style="color: var(--dev-color);">SKUL EDITOR</h2>
                    <label class="edit-label">스컬 이름</label>
                    <input type="text" id="edit-name" class="edit-input" value="${skul.name}">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label class="edit-label">등급 (common, rare, unique, legendary)</label>
                            <input type="text" id="edit-rarity" class="edit-input" value="${skul.rarity}">
                        </div>
                        <div>
                            <label class="edit-label">타입 (balance, speed, power)</label>
                            <input type="text" id="edit-type" class="edit-input" value="${skul.type}">
                        </div>
                    </div>
                    <label class="edit-label">데미지 속성 (phys, magic)</label>
                    <input type="text" id="edit-dmg" class="edit-input" value="${skul.dmg}">
                    <label class="edit-label">한 줄 설명</label>
                    <textarea id="edit-desc" class="edit-input" rows="3">${skul.desc}</textarea>
                    <label class="edit-label">추천 아이템 (쉼표로 구분)</label>
                    <input type="text" id="edit-items" class="edit-input" value="${skul.items.join(', ')}">
                    <label class="edit-label">핵심 각인 (쉼표로 구분)</label>
                    <input type="text" id="edit-ins" class="edit-input" value="${skul.ins.join(', ')}">
                    <label class="edit-label">공략 팁</label>
                    <textarea id="edit-tip" class="edit-input" rows="3">${skul.tip}</textarea>
                    <div class="btn-group">
                        <button class="save-btn" onclick="saveSkul(${index})">변경사항 저장</button>
                        <button class="del-btn" onclick="deleteSkul(${index})">이 스컬 삭제</button>
                    </div>
                `;
            } else {
                body.innerHTML = `
                    <div class="modal-header">
                        <h2>${skul.name}</h2>
                        <span class="dmg-type ${skul.dmg === 'phys' ? 'dmg-phys' : 'dmg-magi'}" style="font-size: 0.9rem;">${skul.dmg === 'phys' ? '물리 데미지 특화' : '마법 데미지 특화'}</span>
                    </div>
                    <p style="font-size: 1rem; color: #bbb; margin: 15px 0;">${skul.desc}</p>
                    
                    <div class="info-grid">
                        <div class="info-box">
                            <h4>최적 추천 아이템</h4>
                            <div class="tag-container">${skul.items.map(i => `<span class="detail-tag">${i}</span>`).join('')}</div>
                        </div>
                        <div class="info-box">
                            <h4>핵심 필수 각인</h4>
                            <div class="tag-container">${skul.ins.map(i => `<span class="detail-tag ins-tag">${i}</span>`).join('')}</div>
                        </div>
                    </div>

                    <div class="skill-category">
                        <h5 class="tag-passive">● 패시브 스킬</h5>
                        <div class="skill-item">
                            <span class="skill-name-tag">${skul.passiveName || '기본 능력'}</span>
                            <span class="skill-desc-tag">${skul.passiveDesc || '고유 능력을 보유하고 있습니다.'}</span>
                        </div>
                    </div>

                    <div class="skill-category">
                        <h5 class="tag-swap">● 교대 스킬</h5>
                        <div class="skill-item">
                            <span class="skill-name-tag">${skul.swapName || '교대 공격'}</span>
                            <span class="skill-desc-tag">${skul.swapDesc || '교대 시 주변에 데미지를 입힙니다.'}</span>
                        </div>
                    </div>

                    <div class="skill-category">
                        <h5 class="tag-active">● 액티브 스킬</h5>
                        <div id="skillContainer">
                            ${skul.skills ? skul.skills.map(s => `
                                <div class="skill-item">
                                    <span class="skill-name-tag">${s.name}</span>
                                    <span class="skill-desc-tag">${s.desc}</span>
                                </div>
                            `).join('') : '스킬 정보 없음'}
                        </div>
                    </div>

                    <div class="play-tip">
                        <strong style="color: var(--accent-color); display: block; margin-bottom: 5px;">빌드 핵심 전략</strong>
                        <p style="margin: 0; font-size: 0.9rem; color: #ccc;">${skul.tip}</p>
                    </div>
                `;
            }
            modal.style.display = 'flex';
        }

        function saveSkul(index) {
            currentSkuls[index] = {
                ...currentSkuls[index],
                name: document.getElementById('edit-name').value,
                rarity: document.getElementById('edit-rarity').value.toLowerCase(),
                type: document.getElementById('edit-type').value.toLowerCase(),
                dmg: document.getElementById('edit-dmg').value.toLowerCase(),
                desc: document.getElementById('edit-desc').value,
                items: document.getElementById('edit-items').value.split(',').map(i => i.trim()),
                ins: document.getElementById('edit-ins').value.split(',').map(i => i.trim()),
                tip: document.getElementById('edit-tip').value
            };
            localStorage.setItem('skulData', JSON.stringify(currentSkuls));
            renderSkuls();
            closeModal();
            alert('저장되었습니다!');
        }

        function deleteSkul(index) {
            if(confirm('정말 삭제하시겠습니까?')) {
                currentSkuls.splice(index, 1);
                localStorage.setItem('skulData', JSON.stringify(currentSkuls));
                renderSkuls();
                closeModal();
            }
        }

        function addNewSkul() {
            const newSkul = {
                name: "새로운 스컬", rarity: "common", type: "balance", dmg: "phys", desc: "설명을 입력하세요.",
                items: ["아이템1"], ins: ["각인1"], tip: "팁을 입력하세요.",
                skills: [{name: "기본 스킬", desc: "스킬 설명을 입력하세요."}]
            };
            currentSkuls.push(newSkul);
            renderSkuls();
            openDetail(newSkul, currentSkuls.length - 1);
        }

        function exportHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], {type: "text/html"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "skul_encyclopedia.html";
            link.click();
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        window.onclick = (e) => { if (e.target == document.getElementById('detailModal')) closeModal(); };

        initData();
    </script>
</body>
</html>
